# NoiThat2026 — duymanh.bhquan.store
# Chạy song song VietNet trên cùng server (không đụng port VietNet 5100/5101/5102)

upstream noithat_fe  { server 127.0.0.1:5200; }
upstream noithat_api { server 127.0.0.1:5202; }

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name duymanh.bhquan.store;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name duymanh.bhquan.store;

    ssl_certificate     /etc/letsencrypt/live/duymanh.bhquan.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/duymanh.bhquan.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL_noithat:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy (/api/ → NestJS port 5202)
    location /api/ {
        proxy_pass http://noithat_api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 25m;
    }

    # Static assets — cache dài
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        proxy_pass http://noithat_fe;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Frontend (Next.js standalone port 5200 — maps to container port 3000)
    location / {
        proxy_pass http://noithat_fe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
