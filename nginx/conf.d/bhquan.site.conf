# ──────────────────────────────────────────
# VietNet2026 — Nginx config cho shared-nginx
# Domain: bhquan.site
# Dung resolver + set $var de nginx khong crash khi container chua up
# ──────────────────────────────────────────

server {
    listen 80;
    server_name bhquan.site www.bhquan.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name bhquan.site www.bhquan.site;

    ssl_certificate     /etc/letsencrypt/live/bhquan.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bhquan.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Docker DNS resolver — dynamic resolution, nginx khong crash khi container chua up
    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 20m;

    # ─── API → NestJS backend ────────────────
    location /api/ {
        set $vn_api http://vietnet-api:4000;
        proxy_pass $vn_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ─── Socket.IO → NestJS backend ──────────
    location /socket.io/ {
        set $vn_api http://vietnet-api:4000;
        proxy_pass $vn_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ─── Next.js static assets (immutable) ──
    location /_next/static/ {
        set $vn_fe http://vietnet-frontend:3000;
        proxy_pass $vn_fe;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Frontend SSR → Next.js ──────────────
    location / {
        set $vn_fe http://vietnet-frontend:3000;
        proxy_pass $vn_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
