name: Daily Backup

on:
  schedule:
    - cron: '0 18 * * *'   # 1:00 AM UTC+7
  workflow_dispatch:

env:
  INFRA_DIR: /opt/infra
  KEEP_DAYS: 7
  PROJECT: vietnet

permissions:
  contents: write

jobs:
  backup:
    name: Backup DB + Uploads → Git
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV
          echo "DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Create backups on VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          DATE="${{ env.DATE }}"

          sshpass -e ssh -p $PORT $VPS "
            set -e
            BACKUP_DIR=/tmp/backup-vietnet-${DATE}
            rm -rf \$BACKUP_DIR
            mkdir -p \$BACKUP_DIR

            MYSQL_ROOT_PWD=\$(grep '^MYSQL_ROOT_PASSWORD=' ${INFRA_DIR}/.env 2>/dev/null | cut -d= -f2-)
            if [ -z \"\$MYSQL_ROOT_PWD\" ]; then
              echo 'ERROR: MYSQL_ROOT_PASSWORD not found in ${INFRA_DIR}/.env'
              exit 1
            fi

            # ── Verify MySQL ──
            echo '=== MySQL check ==='
            if ! docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
              echo 'ERROR: shared-mysql not responding'
              docker logs shared-mysql --tail 20 2>&1 || true
              exit 1
            fi
            echo 'MySQL: OK'

            # ── DB dump ──
            echo ''
            echo '=== Database dump ==='
            echo 'Dumping vietnet...'
            docker exec shared-mysql mysqldump -u root -p\${MYSQL_ROOT_PWD} \
              --single-transaction --routines --triggers --events \
              vietnet > /tmp/dump_vietnet.sql 2>/tmp/dump_err.txt \
              || { echo 'MYSQLDUMP FAILED:'; cat /tmp/dump_err.txt; rm -f /tmp/dump_err.txt /tmp/dump_vietnet.sql; exit 1; }
            rm -f /tmp/dump_err.txt
            gzip -c /tmp/dump_vietnet.sql > \$BACKUP_DIR/vietnet.sql.gz
            rm -f /tmp/dump_vietnet.sql
            echo \"  \$(du -h \$BACKUP_DIR/vietnet.sql.gz | cut -f1)\"

            # ── Uploads volume ──
            echo ''
            echo '=== Upload archives ==='
            VN_UPLOADS=\$(docker volume inspect vietnet_uploads --format '{{.Mountpoint}}' 2>/dev/null || echo '')
            if [ -n \"\$VN_UPLOADS\" ] && [ -d \"\$VN_UPLOADS\" ] && [ \"\$(ls -A \$VN_UPLOADS 2>/dev/null)\" ]; then
              echo \"VietNet uploads: \$VN_UPLOADS\"
              cd \$VN_UPLOADS && zip -rq \$BACKUP_DIR/uploads.zip . && cd /
              echo \"  \$(du -h \$BACKUP_DIR/uploads.zip | cut -f1)\"
            else
              echo 'No uploads found (skip)'
            fi

            # ── Verify integrity ──
            echo ''
            echo '=== Verify backups ==='
            VERIFY_FAIL=0
            for gz in \$(find \$BACKUP_DIR -name '*.sql.gz'); do
              if gunzip -t \"\$gz\" 2>/dev/null; then
                SIZE=\$(stat -c%s \"\$gz\")
                if [ \"\$SIZE\" -lt 100 ]; then
                  echo \"FAIL: \$(basename \$gz) too small\"
                  VERIFY_FAIL=1
                else
                  echo \"OK: \$(basename \$gz) (\$(du -h \$gz | cut -f1))\"
                fi
              else
                echo \"FAIL: \$(basename \$gz) corrupt\"
                VERIFY_FAIL=1
              fi
            done
            for z in \$(find \$BACKUP_DIR -name '*.zip'); do
              if unzip -tq \"\$z\" > /dev/null 2>&1; then
                echo \"OK: \$(basename \$z) (\$(du -h \$z | cut -f1))\"
              else
                echo \"FAIL: \$(basename \$z) corrupt\"
                VERIFY_FAIL=1
              fi
            done
            [ \$VERIFY_FAIL -eq 0 ] || { echo 'ERROR: Verification failed!'; exit 1; }

            echo ''
            echo '=== All backup files ==='
            find \$BACKUP_DIR -type f -exec ls -lh {} \;
          "

      - name: Download backups from VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          DATE="${{ env.DATE }}"
          mkdir -p /tmp/backups
          sshpass -e scp -P $PORT -r $VPS:/tmp/backup-vietnet-${DATE}/* /tmp/backups/
          echo "Downloaded:"; find /tmp/backups -type f -exec ls -lh {} \;

      - name: Encrypt backups
        run: |
          ENCRYPT_KEY="${{ secrets.BACKUP_ENCRYPT_KEY }}"
          if [ -z "$ENCRYPT_KEY" ]; then
            echo "WARNING: BACKUP_ENCRYPT_KEY not set — skipping encryption"
            exit 0
          fi
          for f in $(find /tmp/backups -type f \( -name '*.sql.gz' -o -name '*.zip' \)); do
            gpg --batch --yes --passphrase "${ENCRYPT_KEY}" \
              --symmetric --cipher-algo AES256 "$f"
            rm -f "$f"
            echo "Encrypted: $(basename "$f").gpg"
          done
          find /tmp/backups -type f -exec ls -lh {} \;

      - name: Push to backups branch
        run: |
          DATE="${{ env.DATE }}"
          git fetch origin backups 2>/dev/null || true
          if git rev-parse origin/backups >/dev/null 2>&1; then
            git checkout backups
          else
            git checkout --orphan backups
            git rm -rf . > /dev/null 2>&1 || true
            cat > README.md << 'EOF'
# Backups (encrypted)

Auto-generated daily backups. All files encrypted with AES-256.

Decrypt: `gpg --decrypt --output FILE FILE.gpg`

Structure:
```
vietnet/YYYY-MM-DD/vietnet.sql.gz.gpg
vietnet/YYYY-MM-DD/uploads.zip.gpg
```
EOF
            git add README.md
          fi

          mkdir -p "vietnet/${DATE}"
          cp /tmp/backups/* "vietnet/${DATE}/" 2>/dev/null || true

          # Prune old backups
          CUTOFF=$(date -d "${KEEP_DAYS} days ago" +%Y-%m-%d)
          for dir in vietnet/*/; do
            DIRNAME=$(basename "$dir")
            if [[ "$DIRNAME" < "$CUTOFF" ]]; then
              echo "Removing old: $dir"
              rm -rf "$dir"
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "backup: ${DATE}"
            git push origin backups
          fi

      - name: Diagnose on failure
        if: failure()
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            echo '=== Container status ==='
            docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.RestartCount}}' | grep -E 'vietnet|shared-' || true
            echo ''
            echo '=== MySQL logs (last 20) ==='
            docker logs shared-mysql --tail 20 2>&1 || echo 'shared-mysql: not found'
            echo ''
            echo '=== Disk / Memory ==='
            df -h / | tail -1; free -h | head -2
          " 2>/dev/null || echo '::warning::Cannot SSH to VPS for diagnostics'

      - name: Cleanup VPS temp
        if: always()
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "rm -rf /tmp/backup-vietnet-* /tmp/dump_*.sql /tmp/dump_err.txt" 2>/dev/null || true

      - name: Summary
        run: |
          echo "==============================="
          echo "Backup OK — ${{ env.DATE }}"
          echo "Repo: VietNet2026 | DB: vietnet"
          echo "Branch: backups | Retention: ${{ env.KEEP_DAYS }} days"
          echo "==============================="
