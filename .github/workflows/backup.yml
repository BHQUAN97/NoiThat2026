name: Daily Backup NoiThat2026

on:
  schedule:
    - cron: '30 18 * * *' # 1:30 AM UTC+7
  workflow_dispatch:

env:
  INFRA_DIR: /opt/infra
  APP_DIR: /opt/noithat2026
  KEEP_DAYS: 7
  DB_NAME: noithat2026
  DB_USER: noithat
  VOLUME_NAME: noithat_uploads
  BACKUP_BRANCH: backups

permissions:
  contents: write

jobs:
  backup:
    name: Backup DB + Uploads → Git
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          VPS_PORT="${{ secrets.VPS_PORT }}"
          VPS_PORT="${VPS_PORT:-22}"
          ssh-keyscan -p $VPS_PORT -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV
          echo "DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          echo "SSH_PORT=${VPS_PORT}" >> $GITHUB_ENV

      - name: Create backups on VPS
        env:
          NOITHAT_DB_PASSWORD: ${{ secrets.NOITHAT_DB_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ env.SSH_PORT }}"
          DATE="${{ env.DATE }}"

          sshpass -e ssh -p $PORT $VPS "
            set -e
            BACKUP_DIR=/tmp/backup-noithat-${DATE}
            rm -rf \$BACKUP_DIR
            mkdir -p \$BACKUP_DIR

            # Lay DB password tu app .env (deploy sync tu GitHub Secrets)
            DB_PWD=\$(grep '^DB_PASSWORD=' ${APP_DIR}/.env 2>/dev/null | cut -d= -f2-)
            if [ -z \"\$DB_PWD\" ]; then
              echo 'ERROR: DB_PASSWORD not found in ${APP_DIR}/.env'
              exit 1
            fi

            # ── Verify MySQL ──
            echo '=== MySQL check ==='
            if ! docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
              echo 'ERROR: shared-mysql not responding'
              docker logs shared-mysql --tail 20 2>&1 || true
              exit 1
            fi
            # Verify user co the connect
            if ! docker exec -e MYSQL_PWD=\"\$DB_PWD\" shared-mysql mysql -u ${DB_USER} ${DB_NAME} -e 'SELECT 1' >/dev/null 2>&1; then
              echo 'ERROR: Cannot connect as ${DB_USER}@${DB_NAME} — check password'
              exit 1
            fi
            echo 'MySQL: OK (user=${DB_USER})'

            # ── DB dump (dung user rieng, khong can root) ──
            echo ''
            echo '=== Database dump: ${DB_NAME} ==='
            docker exec -e MYSQL_PWD=\"\$DB_PWD\" shared-mysql mysqldump \
              -u ${DB_USER} \
              --single-transaction --routines --triggers \
              ${DB_NAME} > /tmp/dump_noithat.sql 2>/tmp/dump_noithat_err.txt \
              || { echo 'MYSQLDUMP FAILED:'; cat /tmp/dump_noithat_err.txt; rm -f /tmp/dump_noithat_err.txt /tmp/dump_noithat.sql; exit 1; }
            rm -f /tmp/dump_noithat_err.txt
            gzip -c /tmp/dump_noithat.sql > \$BACKUP_DIR/${DB_NAME}.sql.gz
            rm -f /tmp/dump_noithat.sql
            echo \"  DB: \$(du -h \$BACKUP_DIR/${DB_NAME}.sql.gz | cut -f1)\"

            # ── Uploads volume ──
            echo ''
            echo '=== Upload archives: ${VOLUME_NAME} ==='
            UPLOADS_PATH=\$(docker volume inspect ${VOLUME_NAME} --format '{{.Mountpoint}}' 2>/dev/null || echo '')
            if [ -n \"\$UPLOADS_PATH\" ] && [ -d \"\$UPLOADS_PATH\" ] && [ \"\$(ls -A \$UPLOADS_PATH 2>/dev/null)\" ]; then
              echo \"Uploads path: \$UPLOADS_PATH\"
              cd \$UPLOADS_PATH && zip -rq \$BACKUP_DIR/uploads.zip . && cd /
              echo \"  Uploads: \$(du -h \$BACKUP_DIR/uploads.zip | cut -f1)\"
            else
              echo 'No uploads found (skip)'
            fi

            # ── Settings export (JSON) ──
            echo ''
            echo '=== Settings export ==='
            SETTINGS_JSON=\$(docker exec -e MYSQL_PWD=\"\$DB_PWD\" shared-mysql mysql -u ${DB_USER} ${DB_NAME} \
              -N -e \"SELECT JSON_OBJECTAGG(\\\`key\\\`, value) FROM site_configs\" 2>/dev/null || echo '')
            if [ -n \"\$SETTINGS_JSON\" ] && [ \"\$SETTINGS_JSON\" != 'NULL' ]; then
              echo \"\$SETTINGS_JSON\" > \$BACKUP_DIR/settings.json
              echo \"  Settings: \$(du -h \$BACKUP_DIR/settings.json | cut -f1)\"
            else
              echo 'No settings found (skip)'
            fi

            # ── Verify integrity ──
            echo ''
            echo '=== Verify backups ==='
            VERIFY_FAIL=0
            for gz in \$(find \$BACKUP_DIR -name '*.sql.gz'); do
              if gunzip -t \"\$gz\" 2>/dev/null; then
                SIZE=\$(stat -c%s \"\$gz\")
                if [ \"\$SIZE\" -lt 100 ]; then
                  echo \"FAIL: \$(basename \$gz) too small\"
                  VERIFY_FAIL=1
                else
                  echo \"OK: \$(basename \$gz) (\$(du -h \$gz | cut -f1))\"
                fi
              else
                echo \"FAIL: \$(basename \$gz) corrupt\"
                VERIFY_FAIL=1
              fi
            done
            for z in \$(find \$BACKUP_DIR -name '*.zip'); do
              if unzip -tq \"\$z\" > /dev/null 2>&1; then
                echo \"OK: \$(basename \$z) (\$(du -h \$z | cut -f1))\"
              else
                echo \"FAIL: \$(basename \$z) corrupt\"
                VERIFY_FAIL=1
              fi
            done
            [ \$VERIFY_FAIL -eq 0 ] || { echo 'ERROR: Verification failed!'; exit 1; }

            echo ''
            echo '=== All backup files ==='
            find \$BACKUP_DIR -type f -exec ls -lh {} \;
          "

      - name: Download backups from VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ env.SSH_PORT }}"
          DATE="${{ env.DATE }}"
          mkdir -p /tmp/backups
          sshpass -e scp -P $PORT -r $VPS:/tmp/backup-noithat-${DATE}/* /tmp/backups/
          echo "Downloaded:"; find /tmp/backups -type f -exec ls -lh {} \;

      - name: Encrypt backups
        run: |
          ENCRYPT_KEY="${{ secrets.BACKUP_ENCRYPT_KEY }}"
          if [ -z "$ENCRYPT_KEY" ]; then
            echo "WARNING: BACKUP_ENCRYPT_KEY not set — skipping encryption"
            exit 0
          fi
          for f in $(find /tmp/backups -type f \( -name '*.sql.gz' -o -name '*.zip' \)); do
            gpg --batch --yes --passphrase "${ENCRYPT_KEY}" \
              --symmetric --cipher-algo AES256 "$f"
            rm -f "$f"
            echo "Encrypted: $(basename "$f").gpg"
          done
          find /tmp/backups -type f -exec ls -lh {} \;

      - name: Push to backups branch
        run: |
          DATE="${{ env.DATE }}"
          git fetch origin ${{ env.BACKUP_BRANCH }} 2>/dev/null || true
          if git rev-parse origin/${{ env.BACKUP_BRANCH }} >/dev/null 2>&1; then
            git checkout ${{ env.BACKUP_BRANCH }}
          else
            git checkout --orphan ${{ env.BACKUP_BRANCH }}
            git rm -rf . > /dev/null 2>&1 || true
            cat > README.md << 'EOF'
# NoiThat2026 Backups (encrypted)

Auto-generated daily backups. All files encrypted with AES-256.

## Decrypt
```bash
gpg --decrypt --output FILE FILE.gpg
```

## Structure
```
noithat/YYYY-MM-DD/noithat2026.sql.gz.gpg   — MySQL dump
noithat/YYYY-MM-DD/uploads.zip.gpg           — Media files (ảnh sản phẩm, logo, banner)
noithat/YYYY-MM-DD/settings.json             — Site settings export (không encrypt)
```

## Restore
```bash
# DB
gpg --decrypt noithat2026.sql.gz.gpg | gunzip | mysql -u noithat -p noithat2026

# Uploads
gpg --decrypt uploads.zip.gpg > uploads.zip && unzip uploads.zip -d /path/to/uploads/
```
EOF
            git add README.md
          fi

          mkdir -p "noithat/${DATE}"
          cp /tmp/backups/* "noithat/${DATE}/" 2>/dev/null || true

          # Prune old backups
          CUTOFF=$(date -d "${{ env.KEEP_DAYS }} days ago" +%Y-%m-%d)
          for dir in noithat/*/; do
            DIRNAME=$(basename "$dir")
            if [[ "$DIRNAME" < "$CUTOFF" ]]; then
              echo "Removing old: $dir"
              rm -rf "$dir"
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "backup: noithat ${DATE}"
            git push origin ${{ env.BACKUP_BRANCH }}
          fi

      - name: Diagnose on failure
        if: failure()
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ env.SSH_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            echo '=== Container status ==='
            docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.RestartCount}}' | grep -E 'noithat|shared-' || true
            echo ''
            echo '=== MySQL logs (last 20) ==='
            docker logs shared-mysql --tail 20 2>&1 || echo 'shared-mysql: not found'
            echo ''
            echo '=== Disk / Memory ==='
            df -h / | tail -1; free -h | head -2
          " 2>/dev/null || echo '::warning::Cannot SSH to VPS for diagnostics'

      - name: Cleanup VPS temp
        if: always()
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ env.SSH_PORT }}"
          sshpass -e ssh -p $PORT $VPS "rm -rf /tmp/backup-noithat-* /tmp/dump_noithat*.sql /tmp/dump_noithat_err.txt" 2>/dev/null || true

      - name: Summary
        run: |
          echo "==============================="
          echo "Backup OK — ${{ env.DATE }}"
          echo "Repo: NoiThat2026 | DB: ${{ env.DB_NAME }}"
          echo "Branch: ${{ env.BACKUP_BRANCH }} | Retention: ${{ env.KEEP_DAYS }} days"
          echo "==============================="
