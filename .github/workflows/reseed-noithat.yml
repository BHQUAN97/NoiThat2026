name: Reseed NoiThat DB

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm (idempotent — safe to re-run)'
        required: true
        default: ''

env:
  APP_DIR: /opt/noithat2026

jobs:
  reseed:
    name: "Run seed on VPS"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Run seed
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT || '22' }}"
          sshpass -e ssh -p $PORT $VPS "
            set -e
            export PATH=\$PATH:/usr/local/bin
            echo '=== Reseed NoiThat2026 — \$(date) ==='
            cd ${APP_DIR}

            curl -sf http://localhost:5202/api/health > /dev/null 2>&1 || { echo 'ERROR: backend not running'; docker compose -f docker-compose.prod.yml ps; exit 1; }

            echo '--- Running seed ---'
            docker compose -f docker-compose.prod.yml exec -T backend npm run seed:prod 2>&1

            echo '=== Reseed done: \$(date) ==='
          "
