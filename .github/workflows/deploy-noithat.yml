name: Deploy NoiThat2026

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-noithat
  cancel-in-progress: true

env:
  APP_DIR: /opt/noithat
  INFRA_DIR: /opt/infra

jobs:
  # ─── 1. Typecheck ─────────────────────────────────
  typecheck-fe:
    name: "Typecheck FE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npx tsc --noEmit

  typecheck-be:
    name: "Typecheck BE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci && npx tsc --noEmit

  # ─── 2. Deploy ────────────────────────────────────
  deploy:
    name: "Deploy to VPS"
    runs-on: ubuntu-latest
    needs: [typecheck-fe, typecheck-be]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH (password)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Deploy
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            set -e
            export PATH=\$PATH:/usr/local/bin
            echo '=== Deploy NoiThat2026 — \$(date) ==='

            [ ! -d ${APP_DIR} ] && { echo 'ERROR: ${APP_DIR} not found. Clone repo first.'; exit 1; }
            cd ${APP_DIR}

            echo '--- Git pull ---'
            git pull origin main

            echo '--- Docker build + up ---'
            docker compose up -d --build --remove-orphans

            echo '--- Wait for backend (max 60s) ---'
            for i in \$(seq 1 12); do
              curl -sf http://localhost:5202/api/health > /dev/null 2>&1 && { echo \"Backend healthy after \$((i*5))s\"; break; }
              [ \$i -eq 12 ] && { echo 'ERROR: backend timeout'; docker compose logs backend --tail 30; exit 1; }
              echo \"Waiting... (\$i/12)\"
              sleep 5
            done

            echo '--- Run migrations ---'
            docker compose exec -T backend npm run migration:run:prod 2>&1 || echo 'Migrations: nothing to run'

            echo '--- Reload nginx ---'
            cp nginx/conf.d/duymanh.bhquan.store.conf ${INFRA_DIR}/nginx/conf.d/
            docker exec shared-nginx nginx -t && docker exec shared-nginx nginx -s reload

            echo '--- Cleanup ---'
            docker image prune -f > /dev/null

            echo '=== Deploy done: \$(date) ==='
            curl -sf http://localhost:5202/api/health || true
          "
