name: Deploy NoiThat2026

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-noithat
  cancel-in-progress: true

env:
  APP_DIR: /opt/noithat2026
  INFRA_DIR: /opt/infra

jobs:
  # ─── 1. Typecheck (parallel) ────────────────────────
  typecheck-fe:
    name: "Typecheck FE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npx tsc --noEmit

  typecheck-be:
    name: "Typecheck BE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci && npx tsc --noEmit

  # ─── 2. Deploy ──────────────────────────────────────
  deploy:
    name: "Deploy to VPS"
    runs-on: ubuntu-latest
    needs: [typecheck-fe, typecheck-be]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Sync .env to VPS
        env:
          NOITHAT_DB_PASSWORD: ${{ secrets.NOITHAT_DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT || '22' }}"
          printf 'DB_PASSWORD=%s\n' "$NOITHAT_DB_PASSWORD" > /tmp/noithat.env
          printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> /tmp/noithat.env
          printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY" >> /tmp/noithat.env
          printf 'MAIL_FROM=%s\n' "Noi That Duy Manh <noreply@duymanhnoithat.vn>" >> /tmp/noithat.env
          printf 'ADMIN_EMAIL=%s\n' "buihongquan28041997@gmail.com" >> /tmp/noithat.env
          sshpass -e scp -P $PORT /tmp/noithat.env $VPS:${APP_DIR}/.env
          sshpass -e ssh -p $PORT $VPS "chmod 600 ${APP_DIR}/.env"
          rm -f /tmp/noithat.env
          echo ".env synced to VPS"

      - name: Ensure DB user
        env:
          NOITHAT_DB_PASSWORD: ${{ secrets.NOITHAT_DB_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT || '22' }}"
          MYSQL_RUNNING=$(sshpass -e ssh -p $PORT $VPS \
            "docker ps --filter name=shared-mysql --filter status=running --format '{{.Names}}'" 2>/dev/null || echo "")
          if [ -z "$MYSQL_RUNNING" ]; then
            echo "::warning::shared-mysql not running — skip DB user setup"
            exit 0
          fi
          printf "CREATE DATABASE IF NOT EXISTS noithat2026 CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;\nCREATE USER IF NOT EXISTS 'noithat'@'%%' IDENTIFIED BY '%s';\nALTER USER 'noithat'@'%%' IDENTIFIED BY '%s';\nGRANT ALL PRIVILEGES ON noithat2026.* TO 'noithat'@'%%';\nFLUSH PRIVILEGES;\n" \
            "$NOITHAT_DB_PASSWORD" "$NOITHAT_DB_PASSWORD" > /tmp/ensure_noithat.sql
          sshpass -e scp -P $PORT /tmp/ensure_noithat.sql $VPS:/tmp/ensure_noithat.sql
          rm -f /tmp/ensure_noithat.sql
          sshpass -e ssh -p $PORT $VPS "
            docker cp /tmp/ensure_noithat.sql shared-mysql:/tmp/ensure_noithat.sql
            docker exec shared-mysql bash -c 'MYSQL_PWD=\"\$MYSQL_ROOT_PASSWORD\" mysql -u root < /tmp/ensure_noithat.sql' 2>&1
            docker exec shared-mysql rm -f /tmp/ensure_noithat.sql
            rm -f /tmp/ensure_noithat.sql
          "

      - name: Run DB changelog
        env:
          NOITHAT_DB_PASSWORD: ${{ secrets.NOITHAT_DB_PASSWORD }}
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT || '22' }}"
          MYSQL_RUNNING=$(sshpass -e ssh -p $PORT $VPS \
            "docker ps --filter name=shared-mysql --filter status=running --format '{{.Names}}'" 2>/dev/null || echo "")
          if [ -z "$MYSQL_RUNNING" ]; then
            echo "::warning::shared-mysql not running — skip DB changelog"
            exit 0
          fi

          MYSQL_CMD="docker exec -i shared-mysql mysql -u noithat -p${NOITHAT_DB_PASSWORD} noithat2026"

          # Ensure schema_changelog table
          sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < db/changelog/_init/001__schema_changelog.sql 2>/dev/null || true

          # Get applied migrations
          APPLIED=$(sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -N -e \"SELECT CONCAT(version, '/', filename) FROM schema_changelog\"" 2>/dev/null || echo "")

          echo "=== NoiThat2026 DB Changelog ==="
          PASS=0; SKIP=0; FAIL=0

          for ver_dir in $(find db/changelog -mindepth 1 -maxdepth 1 -type d ! -name '_init' | sort); do
            VER=$(basename "$ver_dir")
            echo "── Version $VER ──"
            for f in $(find "$ver_dir" -name '*.sql' -type f | sort); do
              FNAME=$(basename "$f")
              KEY="${VER}/${FNAME}"

              if echo "$APPLIED" | grep -qF "$KEY"; then
                echo "  [SKIP] $FNAME"
                SKIP=$((SKIP + 1))
                continue
              fi

              echo -n "  [RUN] $FNAME ... "
              if sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD" < "$f" 2>&1; then
                CHECKSUM=$(sha256sum "$f" | awk '{print $1}')
                DESC=$(echo "$FNAME" | sed 's/^[0-9]*__//; s/\.sql$//; s/_/ /g')
                sshpass -e ssh -p $PORT $VPS "$MYSQL_CMD -e \"INSERT INTO schema_changelog (version, filename, description, applied_by, checksum) VALUES ('$VER', '$FNAME', '$DESC', 'ci', '$CHECKSUM')\"" 2>/dev/null
                echo "OK"
                PASS=$((PASS + 1))
              else
                echo "FAILED"
                FAIL=$((FAIL + 1))
                exit 1
              fi
            done
          done

          echo "=== Changelog done: $PASS applied, $SKIP skipped, $FAIL failed ==="

      - name: Deploy
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT || '22' }}"
          sshpass -e ssh -p $PORT $VPS "
            set -e
            export PATH=\$PATH:/usr/local/bin
            echo '=== Deploy NoiThat2026 — \$(date) ==='

            [ ! -d ${APP_DIR} ] && { echo 'ERROR: ${APP_DIR} not found. Clone repo first.'; exit 1; }
            cd ${APP_DIR}

            echo '--- Git pull ---'
            git pull origin main

            echo '--- Ensure Docker networks ---'
            docker network create webphoto_backend 2>/dev/null || true
            docker network create noithat_frontend 2>/dev/null || true

            echo '--- Docker build backend ---'
            docker compose -f docker-compose.prod.yml build backend frontend

            echo '--- Start backend first ---'
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --no-deps backend

            echo '--- Wait for backend (max 120s) ---'
            for i in \$(seq 1 24); do
              curl -sf http://localhost:5202/api/health > /dev/null 2>&1 && { echo \"Backend healthy after \$((i*5))s\"; break; }
              [ \$i -eq 24 ] && {
                echo 'ERROR: backend timeout after 120s'
                echo '=== docker logs noithat-api ==='
                docker logs noithat-api --tail 60
                echo '=== container inspect ==='
                docker inspect noithat-api --format '{{.State.Status}} exit={{.State.ExitCode}}'
                exit 1
              }
              echo \"Waiting \$((i*5))s...\"
              sleep 5
            done

            echo '--- Start frontend ---'
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --no-deps frontend

            echo '--- Run migrations ---'
            docker compose -f docker-compose.prod.yml exec -T backend npm run migration:run:prod 2>&1 || echo 'Migrations: nothing to run'

            echo '--- Seed data (if tables empty) ---'
            DB_PWD=\$(grep '^DB_PASSWORD=' ${APP_DIR}/.env | cut -d= -f2-)
            UCOUNT=\$(docker exec shared-mysql mysql -u noithat -p\"\$DB_PWD\" noithat2026 -N -e 'SELECT COUNT(*) FROM users' 2>/dev/null | tr -d '[:space:]' || echo '0')
            if [ \"\$UCOUNT\" = '0' ] || [ -z \"\$UCOUNT\" ]; then
              echo 'Tables empty — running seed...'
              docker compose -f docker-compose.prod.yml exec -T backend npm run seed:admin:prod 2>&1 || echo 'seed:admin warning'
              docker compose -f docker-compose.prod.yml exec -T backend npm run seed:prod 2>&1 || echo 'seed:noithat warning'
              echo 'Seed done'
            else
              echo \"Users table has \$UCOUNT rows — skip seed\"
            fi

            echo '--- Reload nginx ---'
            cp nginx/conf.d/duymanh.bhquan.store.conf ${INFRA_DIR}/nginx/conf.d/
            docker network connect noithat_frontend shared-nginx 2>/dev/null || true
            docker exec shared-nginx nginx -t && docker exec shared-nginx nginx -s reload

            echo '--- Cleanup ---'
            docker image prune -f > /dev/null

            echo '=== Deploy done: \$(date) ==='
          "

      - name: Health check
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT || '22' }}"
          sleep 5
          echo '--- Backend ---'
          for i in $(seq 1 10); do
            if sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:5202/api/health > /dev/null 2>&1"; then
              echo "Backend: OK"; break
            fi
            [ $i -eq 10 ] && {
              echo "::error::Backend health check failed"
              sshpass -e ssh -p $PORT $VPS "docker logs noithat-api --tail 20" 2>&1 || true
              exit 1
            }
            sleep 3
          done
          echo '--- Frontend ---'
          for i in $(seq 1 15); do
            if sshpass -e ssh -p $PORT $VPS "curl -sf http://localhost:5200 > /dev/null 2>&1"; then
              echo "Frontend: OK"; break
            fi
            [ $i -eq 15 ] && {
              echo "::error::Frontend health check failed"
              sshpass -e ssh -p $PORT $VPS "docker logs noithat-frontend --tail 20" 2>&1 || true
              exit 1
            }
            sleep 4
          done
          echo '--- Container status ---'
          sshpass -e ssh -p $PORT $VPS "
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -E 'NAME|noithat' || true
          "
