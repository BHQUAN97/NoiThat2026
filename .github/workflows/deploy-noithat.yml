name: Deploy NoiThat2026

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-noithat
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 300s
          command_timeout: 15m
          script: |
            set -e
            echo "=== Deploy NoiThat2026 ==="
            cd /opt/noithat2026

            echo "--- Git pull ---"
            git pull origin main

            echo "--- Docker build + up (prod) ---"
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "--- Wait for backend healthy ---"
            for i in $(seq 1 12); do
              if curl -sf http://localhost:5202/api/health > /dev/null; then
                echo "Backend healthy"
                break
              fi
              echo "Waiting... ($i/12)"
              sleep 5
            done

            echo "--- Run migrations ---"
            docker compose -f docker-compose.prod.yml exec -T backend \
              npm run migration:run:prod || echo "Migration skipped"

            echo "--- Reload nginx config ---"
            cp nginx/conf.d/duymanh.bhquan.store.conf /opt/infra/nginx/conf.d/
            docker exec shared-nginx nginx -s reload

            echo "--- Cleanup old images ---"
            docker image prune -f

            echo "=== Deploy done: $(date) ==="
